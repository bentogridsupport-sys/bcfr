<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bibliothèque de Révisions · Première</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --ink: #111110;
  --sub: #7a7a74;
  --line: #e2e1db;
  --radius: 14px;
  --font-serif: 'DM Serif Display', Georgia, serif;
  --font-sans: 'DM Sans', system-ui, sans-serif;
  --accent: #2050c0;
  --accent-bg: #e8eefa;
  --accent-dark: #082060;
  --card-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
[data-theme="dark"] {
  --bg: #0f0f0e;
  --surface: #1a1a18;
  --ink: #eeede8;
  --sub: #8a8a84;
  --line: #2a2a28;
  --accent: #4a7cf7;
  --accent-bg: #1a2240;
  --accent-dark: #a0b8ff;
  --card-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--ink);
  line-height: 1.6;
  min-height: 100vh;
}
.theme-toggle {
  position: fixed;
  top: 20px;
  right: 20px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 50%;
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 20px;
  color: var(--ink);
  z-index: 100;
  box-shadow: var(--card-shadow);
}
header {
  text-align: center;
  padding: 60px 24px 40px;
  max-width: 800px;
  margin: 0 auto;
}
header h1 {
  font-family: var(--font-serif);
  font-size: 2.8rem;
  font-weight: 400;
  letter-spacing: -0.02em;
  margin-bottom: 8px;
}
header p {
  color: var(--sub);
  font-size: 1.05rem;
}
header .count {
  display: inline-block;
  margin-top: 12px;
  background: var(--accent-bg);
  color: var(--accent);
  padding: 4px 16px;
  border-radius: 20px;
  font-size: 0.85rem;
  font-weight: 500;
}
.search-bar {
  max-width: 480px;
  margin: 0 auto 32px;
  padding: 0 24px;
}
.search-bar input {
  width: 100%;
  padding: 12px 18px;
  border: 1px solid var(--line);
  border-radius: 12px;
  background: var(--surface);
  color: var(--ink);
  font-family: var(--font-sans);
  font-size: 0.95rem;
  outline: none;
  transition: border-color 0.2s;
}
.search-bar input:focus {
  border-color: var(--accent);
}
.search-bar input::placeholder {
  color: var(--sub);
}
main {
  max-width: 960px;
  margin: 0 auto;
  padding: 0 24px 80px;
}
.section-title {
  font-family: var(--font-serif);
  font-size: 1.5rem;
  font-weight: 400;
  margin: 36px 0 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--line);
}
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}
.card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 18px 20px;
  text-decoration: none;
  color: var(--ink);
  transition: all 0.2s;
  box-shadow: var(--card-shadow);
  display: flex;
  flex-direction: column;
}
.card:hover {
  border-color: var(--accent);
  box-shadow: 0 4px 16px rgba(32,80,192,0.12);
  transform: translateY(-2px);
}
.card .work {
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--accent);
  margin-bottom: 4px;
}
.card .title {
  font-size: 1rem;
  font-weight: 500;
  line-height: 1.4;
  margin-bottom: 4px;
}
.card .author {
  font-size: 0.85rem;
  color: var(--sub);
}
.card .badge {
  margin-top: 10px;
  align-self: flex-start;
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  background: var(--accent-bg);
  color: var(--accent);
  padding: 2px 10px;
  border-radius: 6px;
}
.hidden { display: none !important; }
@media (max-width: 640px) {
  header h1 { font-size: 2rem; }
  .card-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="theme-toggle" onclick="toggleTheme()" title="Changer le thème">☀️</div>

<header>
  <h1>Bibliothèque de Révisions</h1>
  <p>Toutes les fiches pour le bac de français · Première</p>
  <span class="count" id="fileCount"></span>
</header>

<div class="search-bar">
  <input type="text" id="search" placeholder="Rechercher par titre, auteur, œuvre…" oninput="filterCards()">
</div>

<main>
  <h2 class="section-title">Français · Littérature</h2>
  <div class="card-grid" id="cardGrid"></div>
</main>

<script>
const pages = [
  {
    work: "Cyrano de Bergerac",
    title: "La scène du balcon",
    author: "Edmond Rostand",
    file: "cyrano_de_bergerac_el_la_scene_du_balcon_368453.html",
    el: "EL"
  },
  {
    work: "Les Fleurs du Mal",
    title: "L'Albatros",
    author: "Charles Baudelaire",
    file: "baudelaire_l_albatros.html",
    el: "EL 16"
  },
  {
    work: "Eldorado",
    title: "Analyse du roman",
    author: "Laurent Gaudé",
    file: "laurent_gaude_eldorado.html",
    el: "Roman"
  },
  {
    work: "Cahiers de Douai",
    title: "Le Dormeur du val",
    author: "Arthur Rimbaud",
    file: "rimbaud_le_dormeur_du_val.html",
    el: "EL"
  },
  {
    work: "Cahiers de Douai",
    title: "Ma Bohème (Fantaisie)",
    author: "Arthur Rimbaud",
    file: "rimbaud_ma_boheme.html",
    el: "EL 14"
  },
  {
    work: "Les Rêveries du promeneur solitaire",
    title: "Cinquième Promenade",
    author: "Jean-Jacques Rousseau",
    file: "rousseau_reveries.html",
    el: "Texte"
  },
  {
    work: "Discours de la servitude volontaire",
    title: "EL 9",
    author: "Étienne de La Boétie",
    file: "gemini-code-1779524157758.html",
    el: "EL 9"
  },
  {
    work: "Discours de la servitude volontaire",
    title: "EL 11",
    author: "Étienne de La Boétie",
    file: "gemini-code-1779524358127.html",
    el: "EL 11"
  },
  {
    work: "Candide · Le Nègre de Surinam",
    title: "EL 12",
    author: "Voltaire",
    file: "gemini-code-1779524792896.html",
    el: "EL 12"
  },
  {
    work: "Cahier de Douai · Roman",
    title: "EL 15",
    author: "Arthur Rimbaud",
    file: "gemini-code-1779525614715.html",
    el: "EL 15"
  },
  {
    work: "L'Étranger",
    title: "La demande en mariage",
    author: "Albert Camus",
    file: "l_etranger_el_la_demande_en_mariage_140890.html",
    el: "EL"
  },
  {
    work: "Manon Lescaut",
    title: "EL 1 · La rencontre",
    author: "Abbé Prévost",
    file: "manon_lescaut_el_1_la_rencontre_876150.html",
    el: "EL 1"
  },
  {
    work: "Manon Lescaut",
    title: "EL 2 · L'évasion de Saint-Lazare",
    author: "Abbé Prévost",
    file: "manon_lescaut_el_2_l_evasion_de_saint_la_987704.html",
    el: "EL 2"
  },
  {
    work: "Manon Lescaut",
    title: "EL 3 · La mort et l'enterrement de Manon",
    author: "Abbé Prévost",
    file: "manon_lescaut_el_3_la_mort_et_l_enterrem_043228.html",
    el: "EL 3"
  },
  {
    work: "On ne badine pas avec l'amour",
    title: "EL 1 · Scène d'exposition",
    author: "Alfred de Musset",
    file: "on_ne_badine_pas_avec_l_amour_el_1_scene_228102.html",
    el: "EL 1"
  },
  {
    work: "On ne badine pas avec l'amour",
    title: "EL 2 · L'amour selon Perdican",
    author: "Alfred de Musset",
    file: "on_ne_badine_pas_avec_l_amour_el_2_l_amo_274154.html",
    el: "EL 2"
  },
  {
    work: "On ne badine pas avec l'amour",
    title: "EL 3 · Le dénouement",
    author: "Alfred de Musset",
    file: "on_ne_badine_pas_avec_l_amour_el_3_le_de_322820.html",
    el: "EL 3"
  }
];

function render() {
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = pages.map(p => `
    <a href="${p.file}" class="card">
      <div class="work">${p.work}</div>
      <div class="title">${p.title}</div>
      <div class="author">${p.author}</div>
      <div class="badge">${p.el}</div>
    </a>
  `).join('');
  document.getElementById('fileCount').textContent = pages.length + ' fiche' + (pages.length > 1 ? 's' : '');
}

function filterCards() {
  const q = document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('.card').forEach(c => {
    const match = c.textContent.toLowerCase().includes(q);
    c.classList.toggle('hidden', !match);
  });
}

function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.querySelector('.theme-toggle').textContent = isDark ? '☀️' : '🌙';
}

render();
</script>
</body>
</html>
